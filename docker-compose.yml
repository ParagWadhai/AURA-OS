services:

  backend:
    build:
      context: ./backend
    container_name: aura_backend

    ports:
      - "8000:8000"

    env_file:
      - .env

    volumes:
      - ./backend:/app

    depends_on:
      - postgres
      - redis
      - chromadb

  postgres:
    image: postgres:16

    container_name: aura_postgres

    restart: always

    environment:
      POSTGRES_USER: aura_user
      POSTGRES_PASSWORD: aura_password
      POSTGRES_DB: aura_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine

    container_name: aura_redis

    ports:
      - "6379:6379"

  chromadb:
    image: chromadb/chroma

    container_name: aura_chroma

    ports:
      - "8001:8000"

    volumes:
      - chroma_data:/chroma/chroma

  mlflow:
    image: ghcr.io/mlflow/mlflow

    container_name: aura_mlflow

    ports:
      - "5000:5000"

    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000

volumes:

  postgres_data:

  chroma_data: